<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        a {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: #007AFF;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 17px;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>Redirecting back to app...</p>
        <a id="openApp" href="">Open Expense Tracker</a>
    </div>
    <script>
        // Preserve the full URL with Plaid's OAuth query parameters
        var currentUrl = window.location.href;

        // Set the fallback link
        document.getElementById('openApp').href = currentUrl;

        // Try to redirect automatically via Universal Link
        window.location.href = currentUrl;
    </script>
</body>
</html>
